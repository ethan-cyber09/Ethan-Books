<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poem Library 🎨 | World of Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Chewy&display=swap" rel="stylesheet">
  <style>
    :root {
      /* The Ultimate Rainbow Palette */
      --super-red: #ff3838;
      --super-orange: #ff9f1a;
      --super-yellow: #fff200;
      --super-green: #32ff7e;
      --super-blue: #18dcff;
      --super-purple: #cd84f1;
      --super-pink: #ffcccc;
      --text-dark: #1e272e;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 50px 20px;
      color: var(--text-dark);
      line-height: 1.7;
      /* Animated Rainbow Background! */
      background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb, #d4fc79, #96e6a1);
      background-size: 400% 400%;
      animation: rainbow-bg 10s ease infinite;
    }

    @keyframes rainbow-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .story-card {
      max-width: 900px;
      margin: 0 auto;
      /* Warm sunny yellow background for the card */
      background: #fffdf0;
      padding: 60px;
      border-radius: 40px;
      /* Crazy colorful shadows */
      box-shadow: 
        0 20px 0px var(--super-red),
        0 40px 50px rgba(0,0,0,0.2);
      border: 15px solid var(--super-blue);
      transition: transform 0.4s ease;
      position: relative;
    }

    .story-card:hover {
      transform: translateY(-10px) rotate(1deg);
    }

    h1 {
      font-family: 'Chewy', cursive;
      text-align: center;
      font-size: 5rem;
      margin-top: 0;
      margin-bottom: 10px;
      letter-spacing: 3px;
      /* Rainbow Text Effect */
      background: linear-gradient(to right, #ff3838, #ff9f1a, #32ff7e, #18dcff, #cd84f1);
      -webkit-background-clip: text;
      color: transparent;
      /* Fun Drop Shadow */
      filter: drop-shadow(4px 4px 0px var(--super-yellow));
      animation: wiggle 3s infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .intro {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--super-purple);
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 2px 2px 0px var(--super-pink);
    }

    .divider {
      border: none;
      height: 8px;
      background: linear-gradient(90deg, var(--super-red), var(--super-orange), var(--super-yellow), var(--super-green), var(--super-blue), var(--super-purple));
      margin: 40px 0;
      border-radius: 4px;
    }

    .section-title {
      color: var(--text-dark);
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
      display: block;
      text-align: center;
      background-color: var(--super-yellow);
      display: inline-block;
      padding: 10px 30px;
      border-radius: 30px;
      border: 4px dashed var(--super-orange);
      transform: translateX(-50%);
      position: relative;
      left: 50%;
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 25px;
      align-items: center;
    }

    li {
      margin: 0;
      width: 100%;
      max-width: 600px; 
    }

    .nav-link {
      text-decoration: none;
      font-family: 'Chewy', cursive;
      font-size: 2rem;
      padding: 20px 30px;
      border-radius: 30px;
      display: block;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy hover effect */
      color: white;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
      border: 6px solid #fff;
    }

    /* Poem Button 1 (The Swing) - Solid Bright Blue! */
    .poem1-btn {
      background-color: var(--super-blue);
      box-shadow: 0 10px 0px #0984e3;
    }

    /* Poem Button 2 (The Caterpillar) - Solid Bright Orange! */
    .poem2-btn {
      background-color: var(--super-orange);
      box-shadow: 0 10px 0px #e67e22;
    }

    .nav-link:hover {
      transform: translateY(-8px) scale(1.05);
    }

    .welcome-msg {
      background: var(--super-green);
      padding: 15px 40px;
      border-radius: 30px;
      display: inline-block;
      font-weight: 900;
      color: #1e272e;
      font-size: 1.8rem;
      margin-top: 15px;
      text-align: center;
      border: 5px solid var(--super-yellow);
      box-shadow: 0 8px 0px #218c74;
      animation: super-bounce 1.5s infinite alternate;
    }

    @keyframes super-bounce {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-15px) scale(1.1); }
    }

    .text-center p {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text-dark);
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 40px;
      background: var(--super-purple);
      color: #fff;
      font-family: 'Chewy', cursive;
      font-size: 1.5rem;
      border-radius: 20px;
      text-decoration: none;
      transition: all 0.3s ease;
      border-bottom: 8px solid #8c7ae6;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
    }

    .back-btn:hover {
      background: #8c7ae6;
      transform: translateY(4px);
      border-bottom-width: 4px;
    }

    footer {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--super-blue);
      margin-top: 50px;
    }

    .text-center {
      text-align: center;
    }

    /* Floating Background Emojis */
    .floating-emoji {
      position: absolute;
      font-size: 3rem;
      animation: float-around 6s ease-in-out infinite;
      z-index: 10;
    }
    .fe-1 { top: -20px; left: -20px; animation-delay: 0s; }
    .fe-2 { top: -20px; right: -20px; animation-delay: 1s; }
    .fe-3 { bottom: 20%; left: -30px; animation-delay: 2s; }
    .fe-4 { bottom: 20%; right: -30px; animation-delay: 3s; }

    @keyframes float-around {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }
  </style>
</head>
<body>

  <div class="story-card">
    
    <div class="floating-emoji fe-1">🎨</div>
    <div class="floating-emoji fe-2">✨</div>
    <div class="floating-emoji fe-3">🎈</div>
    <div class="floating-emoji fe-4">🌟</div>

    <header>
      <h1>Poetry Corner!</h1>
      <p class="intro">Read, Rhyme, and Imagine! 🚀</p>
    </header>

    <div class="divider"></div>

    <section class="text-center">
      <p>
        Welcome to the Poetry Corner! 🎪<br>
        Pick a poem below to start a rhyming adventure!
      </p>
      <div class="welcome-msg">Let's Read Together! 🤩</div>
    </section>

    <div class="divider"></div>

    <nav>
      <span class="section-title">Choose a Poem</span>
      <ul>
        <li><a href="the-swing.html" class="nav-link poem1-btn">🌳 "The Swing"</a></li>
        
        <li><a href="the-caterpillar.html" class="nav-link poem2-btn">🐛 "The Caterpillar"</a></li>
      </ul>
    </nav>

    <div class="divider"></div>

    <div class="text-center">
      <a href="storiesPage.Html" class="back-btn">⬅ Back to the Main Menu</a>
    </div>

    <footer>
      Created by Ethan | Keep Rhyming! 🎤
    </footer>
  </div>

</body>
</html>
